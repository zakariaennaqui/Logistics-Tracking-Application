version: '3.8'

services:
  # ──────────────────────────────────────────
  # DATABASES
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ennaqui888,
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tracking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # SERVICE DISCOVERY
  # ──────────────────────────────────────────
  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  # API GATEWAY
  # ──────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8888:8888"
    environment:
      - EUREKA_URL=http://discovery-service:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      discovery-service:
        condition: service_healthy

  # ──────────────────────────────────────────
  # MICROSERVICES
  # ──────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/users_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orders_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  delivery-service:
    build: ./delivery-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/delivery_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  warehouse-service:
    build: ./warehouse-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/warehouses_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  tracking-service:
    build: ./tracking-service
    ports:
      - "8086:7860"
    environment:
      - PORT=7860
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tracking_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:7860/eureka/
      - EUREKA_INSTANCE_HOSTNAME=localhost
      - EUREKA_NONSECURE_PORT_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/notifications_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  product-service:
    build: ./product-service
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/products_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  route-service:
    build: ./route-service
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/routes_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ennaqui888,
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

  # ──────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8888
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mysql_data:
