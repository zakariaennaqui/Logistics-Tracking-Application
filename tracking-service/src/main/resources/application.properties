spring.application.name=tracking-service
server.port=${PORT:7860}

# Datasource (PostgreSQL - NeonDB)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable Redis autoconfiguration
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration

# Logging
logging.level.root=WARN
logging.level.com.logistics=INFO
logging.level.org.springframework.boot=INFO

# Eureka - use public HuggingFace hostname when deployed
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:7860/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.non-secure-port-enabled=${EUREKA_NONSECURE_PORT_ENABLED:true}
eureka.instance.non-secure-port=${PORT:7860}
eureka.instance.secure-port-enabled=${EUREKA_SECURE_PORT_ENABLED:false}
eureka.instance.secure-port=443
